<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonick</title>
  <style>
    :root {
      color-scheme: only light;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: "Courier New", "Lucida Console", monospace;
      -webkit-user-select: none;
      user-select: none;
    }

    #game-wrap {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, #2d2f63 0%, transparent 45%),
        radial-gradient(circle at 80% 70%, #1e5a64 0%, transparent 40%),
        linear-gradient(180deg, #3d5ac9 0%, #5fb8ff 45%, #89d9ff 100%);
    }

    #game {
      width: 800px;
      height: 450px;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: pixelated;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
      border: 4px solid rgba(255, 255, 255, 0.2);
      background: #87d7ff;
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <div id="game-wrap">
    <canvas id="game" width="800" height="450" aria-label="Sonick game canvas"></canvas>
  </div>

  <script>
    "use strict";

    // ------------------------------
    // Constants
    // ------------------------------
    const BASE_W = 800;
    const BASE_H = 450;
    const GROUND_Y = 380;
    const FIXED_DT = 1 / 60;
    const MAX_FRAME_DT = 0.05;

    const PLAYER = {
      width: 38,
      height: 46,
      duckHeight: 30,
      moveSpeed: 220,
      runSpeed: 280,
      accel: 1400,
      decel: 1600,
      airControl: 0.78,
      gravity: 1700,
      jumpVel: -585,
      doubleJumpVel: -515,
      maxFallSpeed: 980,
      invincibleRespawn: 2,
      jumpWindow: 0.3,
    };

    const DIFFICULTY = {
      1: { enemyMin: 2, enemyMax: 3, speedMul: 0.8, spikeStep: 520, platformGap: 110 },
      2: { enemyMin: 4, enemyMax: 6, speedMul: 1.0, spikeStep: 390, platformGap: 145 },
      3: { enemyMin: 6, enemyMax: 10, speedMul: 1.2, spikeStep: 290, platformGap: 185 },
    };

    const COLORS = {
      skyTop: "#57b3ff",
      skyBottom: "#9be4ff",
      farHill: "#76d29f",
      midHill: "#41b57f",
      nearGround: "#2a7f59",
      ground: "#7fc65f",
      dirt: "#6d4f2b",
      platform: "#8a6a3d",
      platformTop: "#d6b874",
      stump: "#7a4d24",
      stumpTop: "#9a6a39",
      spike: "#aeb2ba",
      spikeShade: "#767b86",
      coin: "#f6c22d",
      coinShine: "#ffe99f",
      panel: "rgba(0, 0, 0, 0.38)",
      panelStroke: "rgba(255, 255, 255, 0.15)",
      text: "#ffffff",
      textShadow: "rgba(0, 0, 0, 0.7)",
    };

    const BIOMES = [
      {
        name: "Forest",
        skyTop: "#57b3ff",
        skyBottom: "#9be4ff",
        farHill: "#76d29f",
        midHill: "#41b57f",
        nearGround: "#2a7f59",
        ground: "#7fc65f",
        dirt: "#6d4f2b",
        platform: "#8a6a3d",
        platformTop: "#d6b874",
        stump: "#7a4d24",
        stumpTop: "#9a6a39",
      },
      {
        name: "Desert",
        skyTop: "#f8a94b",
        skyBottom: "#ffe39b",
        farHill: "#efc97a",
        midHill: "#d9a45c",
        nearGround: "#bf8337",
        ground: "#e6bc62",
        dirt: "#a0733d",
        platform: "#8f6234",
        platformTop: "#f0d08e",
        stump: "#8b5a2f",
        stumpTop: "#b37a4e",
      },
      {
        name: "Snow",
        skyTop: "#79bbff",
        skyBottom: "#eef9ff",
        farHill: "#d7ecff",
        midHill: "#bfdaf5",
        nearGround: "#9eb8d5",
        ground: "#f2f8ff",
        dirt: "#8da4bc",
        platform: "#6e88a3",
        platformTop: "#ffffff",
        stump: "#6f7f94",
        stumpTop: "#c6d9ee",
      },
      {
        name: "Space",
        skyTop: "#14002f",
        skyBottom: "#34005e",
        farHill: "#3f2e8e",
        midHill: "#5a4cc4",
        nearGround: "#20183f",
        ground: "#3f3572",
        dirt: "#261d4a",
        platform: "#5f52a3",
        platformTop: "#a594f5",
        stump: "#4f3d80",
        stumpTop: "#7f6ac0",
      },
      {
        name: "Surprise",
        skyTop: "#0a263b",
        skyBottom: "#f26f3d",
        farHill: "#35d6c7",
        midHill: "#ff9f43",
        nearGround: "#174067",
        ground: "#39bf6d",
        dirt: "#2f3e46",
        platform: "#714674",
        platformTop: "#ffc4f4",
        stump: "#6e3f2b",
        stumpTop: "#be8b66",
      },
    ];

    const STORAGE_KEY = "sonick_best_score";

    // ------------------------------
    // Utilities
    // ------------------------------
    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function randRange(rng, min, max) {
      return min + (max - min) * rng();
    }

    function randInt(rng, min, max) {
      return Math.floor(randRange(rng, min, max + 1));
    }

    function rectsOverlap(a, b, pad = 0) {
      return (
        a.x - pad < b.x + b.w + pad &&
        a.x + a.w + pad > b.x - pad &&
        a.y - pad < b.y + b.h + pad &&
        a.y + a.h + pad > b.y - pad
      );
    }

    function overlaps(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function mulberry32(seed) {
      let t = seed >>> 0;
      return function () {
        t += 0x6d2b79f5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function biomeForLevel(level) {
      const idx = (Math.max(1, level) - 1) % BIOMES.length;
      return BIOMES[idx];
    }

    // ------------------------------
    // Canvas and scaling
    // ------------------------------
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;

    function resizeCanvasDisplay() {
      const ratio = BASE_W / BASE_H;
      const ww = window.innerWidth;
      const wh = window.innerHeight;
      let drawW = ww;
      let drawH = ww / ratio;
      if (drawH > wh) {
        drawH = wh;
        drawW = wh * ratio;
      }
      canvas.style.width = `${Math.floor(drawW)}px`;
      canvas.style.height = `${Math.floor(drawH)}px`;
    }

    window.addEventListener("resize", resizeCanvasDisplay);
    resizeCanvasDisplay();

    // ------------------------------
    // Audio (WebAudio procedural FX)
    // ------------------------------
    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        audioCtx = new Ctx();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function beep({ freq = 440, duration = 0.1, type = "square", gain = 0.05, slide = 0 }) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const amp = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      if (slide !== 0) {
        osc.frequency.linearRampToValueAtTime(Math.max(40, freq + slide), now + duration);
      }
      amp.gain.setValueAtTime(0.0001, now);
      amp.gain.exponentialRampToValueAtTime(gain, now + 0.012);
      amp.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(amp).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    const sfx = {
      jump() {
        beep({ freq: 360, duration: 0.08, type: "square", gain: 0.06, slide: 180 });
      },
      doubleJump() {
        beep({ freq: 280, duration: 0.07, type: "triangle", gain: 0.07, slide: 220 });
        beep({ freq: 510, duration: 0.1, type: "square", gain: 0.05, slide: 140 });
      },
      coin() {
        beep({ freq: 900, duration: 0.08, type: "square", gain: 0.06, slide: 70 });
      },
      stomp() {
        beep({ freq: 150, duration: 0.11, type: "sawtooth", gain: 0.07, slide: -40 });
      },
      death() {
        beep({ freq: 460, duration: 0.28, type: "sawtooth", gain: 0.08, slide: -360 });
      },
      levelComplete() {
        beep({ freq: 360, duration: 0.08, type: "square", gain: 0.05, slide: 70 });
        beep({ freq: 460, duration: 0.09, type: "square", gain: 0.05, slide: 80 });
        beep({ freq: 620, duration: 0.13, type: "square", gain: 0.05, slide: 80 });
      },
    };

    // ------------------------------
    // Input
    // ------------------------------
    const input = {
      left: false,
      right: false,
      up: false,
      down: false,
      run: false,
      justUp: false,
      justSpace: false,
      justClick: false,
    };

    function mapKey(key, down) {
      if (key === "ArrowLeft") input.left = down;
      else if (key === "ArrowRight") input.right = down;
      else if (key === "ArrowUp") {
        if (down && !input.up) input.justUp = true;
        input.up = down;
      } else if (key === "ArrowDown") input.down = down;
      else if (key === "Shift") input.run = down;
      else if (key === " ") {
        if (down) input.justSpace = true;
      }
    }

    window.addEventListener("keydown", (e) => {
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", " ", "Shift"].includes(e.key)) {
        e.preventDefault();
      }
      mapKey(e.key, true);
      if (e.key === " " || e.key.startsWith("Arrow")) ensureAudio();
    });

    window.addEventListener("keyup", (e) => {
      mapKey(e.key, false);
    });

    canvas.addEventListener("mousedown", () => {
      input.justClick = true;
      ensureAudio();
    });

    // ------------------------------
    // Game state
    // ------------------------------
    const game = {
      mode: "title", // title, playing, dying, gameOver
      level: 1,
      biome: biomeForLevel(1),
      lives: 3,
      totalCoins: 0,
      best: Number(localStorage.getItem(STORAGE_KEY) || 0),
      levelCoins: 0,
      levelGoalTotal: 20,
      levelCompleteTimer: 0,
      deathTimer: 0,
      cameraX: 0,
      flashTimer: 0,
      levelUpFlash: 0,
      deathX: 80,
      levelData: null,
      sparkles: [],
    };

    const player = {
      x: 80,
      y: GROUND_Y - PLAYER.height,
      w: PLAYER.width,
      h: PLAYER.height,
      vx: 0,
      vy: 0,
      facing: 1,
      onGround: true,
      jumpCount: 0,
      lastJumpTime: -99,
      ducking: false,
      invTimer: 0,
      animTime: 0,
      spinTime: 0,
      deathSpin: 0,
      deathFlash: 0,
      deathVx: 0,
      deathVy: 0,
    };

    function updateBestScore() {
      if (game.totalCoins > game.best) {
        game.best = game.totalCoins;
        localStorage.setItem(STORAGE_KEY, String(game.best));
      }
    }

    // ------------------------------
    // Level generation
    // ------------------------------
    function difficultyForLevel(level) {
      if (level <= 1) return DIFFICULTY[1];
      if (level === 2) return DIFFICULTY[2];
      return DIFFICULTY[3];
    }

    function placeCoin(list, x, y, options = {}) {
      list.push({
        x,
        y,
        r: options.r || 8,
        value: options.value || 1,
        special: Boolean(options.special),
        taken: false,
        t: (options.rng ? options.rng() : Math.random()) * Math.PI * 2,
      });
    }

    function isCoinPlacementValid(x, y, platforms, stumps, spikes, coins) {
      const hit = { x: x - 9, y: y - 9, w: 18, h: 18 };
      for (let i = 0; i < platforms.length; i += 1) {
        if (rectsOverlap(hit, platforms[i], 2)) return false;
      }
      for (let i = 0; i < stumps.length; i += 1) {
        if (rectsOverlap(hit, stumps[i], 2)) return false;
      }
      for (let i = 0; i < spikes.length; i += 1) {
        const sp = spikes[i];
        if (rectsOverlap(hit, sp, 2)) return false;
        const aboveSpike = x > sp.x - 10 && x < sp.x + sp.w + 10 && y < sp.y && y > sp.y - 130;
        if (aboveSpike) return false;
      }
      for (let i = 0; i < coins.length; i += 1) {
        const c = coins[i];
        const dx = c.x - x;
        const dy = c.y - y;
        if (dx * dx + dy * dy < 13 * 13) return false;
      }
      return true;
    }

    function generateLevel(level) {
      const seed = level * 1337 + 99;
      const rng = mulberry32(seed);
      const diff = difficultyForLevel(level);
      const levelBoost = Math.max(0, level - 1);
      const width = randInt(rng, 6000, 8000);

      const platforms = [];
      const stumps = [];
      const spikes = [];
      const coins = [];
      const enemies = [];

      function tryPlaceCoin(x, y, options = {}) {
        if (isCoinPlacementValid(x, y, platforms, stumps, spikes, coins)) {
          placeCoin(coins, x, y, { ...options, rng });
          return true;
        }
        return false;
      }

      const segment = 260;
      const margin = 160;

      // Platforms with gaps that grow by difficulty level.
      const platformGap = Math.max(70, diff.platformGap - Math.min(70, levelBoost * 8));
      const skipPlatformChance = clamp(0.2 - levelBoost * 0.018, 0.04, 0.2);
      for (let x = margin; x < width - 420; x += segment + randInt(rng, 0, platformGap)) {
        if (rng() < skipPlatformChance) continue;
        const w = randInt(rng, 100, 210);
        const typeRoll = rng();
        let y = GROUND_Y - randInt(rng, 62, 92);
        if (typeRoll > 0.7) {
          y = GROUND_Y - randInt(rng, 105, 155);
        }
        platforms.push({ x, y, w, h: 18 });

        // Coins on platform top.
        const coinCount = randInt(rng, 1, 3);
        for (let i = 0; i < coinCount; i += 1) {
          const cx = x + (w * (i + 1)) / (coinCount + 1);
          tryPlaceCoin(cx, y - 16);
        }
      }

      // Ground stumps and spikes.
      for (let x = 260; x < width - 250; x += randInt(rng, 220, 460)) {
        if (rng() < 0.65) {
          const w = randInt(rng, 28, 52);
          const h = randInt(rng, 24, 34);
          const stump = { x, y: GROUND_Y - h, w, h };
          let blocked = false;
          for (let i = 0; i < stumps.length; i += 1) {
            if (rectsOverlap(stump, stumps[i], 16)) {
              blocked = true;
              break;
            }
          }
          if (!blocked) stumps.push(stump);
        }
      }

      const spikeStep = Math.max(220, diff.spikeStep - Math.min(90, levelBoost * 12));
      for (let x = 350; x < width - 300; x += randInt(rng, spikeStep - 80, spikeStep + 80)) {
        if (rng() < 0.92) {
          const w = randInt(rng, 30, 48);
          const h = randInt(rng, 24, 34);
          const spike = { x, y: GROUND_Y - h, w, h };
          let blocked = false;
          for (let i = 0; i < stumps.length; i += 1) {
            if (rectsOverlap(spike, stumps[i], 22)) {
              blocked = true;
              break;
            }
          }
          if (!blocked) {
            for (let i = 0; i < spikes.length; i += 1) {
              if (rectsOverlap(spike, spikes[i], 24)) {
                blocked = true;
                break;
              }
            }
          }
          if (!blocked) spikes.push(spike);
        }
      }

      // Ground and arc coins.
      const targetCoins = randInt(rng, 40, 60);
      let coinAttempts = 0;
      while (coins.length < targetCoins && coinAttempts < 4000) {
        coinAttempts += 1;
        const x = randInt(rng, 120, width - 180);
        if (rng() < 0.32) {
          const steps = randInt(rng, 3, 5);
          const radius = randInt(rng, 40, 78);
          for (let i = 0; i < steps && coins.length < targetCoins; i += 1) {
            const t = i / (steps - 1 || 1);
            const y = GROUND_Y - 36 - Math.sin(t * Math.PI) * radius;
            tryPlaceCoin(x + i * 26, y);
          }
        } else {
          tryPlaceCoin(x, GROUND_Y - randInt(rng, 32, 72));
        }
      }

      if (level >= 3) {
        const specialCount = clamp(1 + Math.floor((level - 1) / 5), 1, 2);
        let placed = 0;
        let attempts = 0;
        while (placed < specialCount && attempts < 180) {
          attempts += 1;
          const sx = randInt(rng, 180, width - 200);
          const sy = GROUND_Y - randInt(rng, 45, 170);
          if (tryPlaceCoin(sx, sy, { special: true, value: 5, r: 9 })) {
            placed += 1;
          }
        }
      }

      // Enemy scaling and limits from spike count.
      const maxBySpike = Math.max(diff.enemyMin, spikes.length * 2);
      const desired = randInt(rng, diff.enemyMin, diff.enemyMax) + Math.min(6, Math.floor(levelBoost * 1.2));
      const enemyCount = Math.min(desired, maxBySpike);

      let greenBias = 0.75;
      if (level === 2) greenBias = 0.52;
      if (level >= 3) greenBias = 0.35;

      for (let i = 0; i < enemyCount; i += 1) {
        let type = rng() < greenBias ? "green" : "red";
        if (level >= 4 && rng() < 0.18) {
          type = "blue";
        }
        const baseSpeed = (type === "green" ? 150 : 165) * diff.speedMul;
        const flySpeed = 95 * (0.84 + Math.min(0.35, level * 0.02));
        const hasHorns = i % 2 === 0;
        const canStartPlatform = platforms.length > 0 && rng() < 0.35;
        let spawnX = randInt(rng, 240, width - 250);
        let spawnY = GROUND_Y - (type === "green" ? 36 : 40);
        if (type === "blue") {
          spawnY = GROUND_Y - randInt(rng, 120, 210);
        }
        if (canStartPlatform) {
          const p = platforms[randInt(rng, 0, platforms.length - 1)];
          spawnX = clamp(randInt(rng, Math.floor(p.x), Math.floor(p.x + p.w - 40)), 120, width - 200);
          if (type !== "blue") {
            spawnY = p.y - (type === "green" ? 36 : 40);
          }
        }
        enemies.push({
          type,
          x: spawnX,
          y: spawnY,
          w: type === "green" ? 34 : (type === "blue" ? 36 : 40),
          h: type === "green" ? 36 : (type === "blue" ? 30 : 40),
          vx: (rng() < 0.5 ? -1 : 1) * randRange(rng, baseSpeed * 0.6, baseSpeed * 0.78),
          vy: 0,
          alive: true,
          canBeStomped: !hasHorns,
          hasHorns,
          squashTimer: 0,
          aiTimer: randRange(rng, 0.4, 1.7),
          rushTimer: 0,
          speed: type === "blue" ? flySpeed : baseSpeed,
          dir: rng() < 0.5 ? -1 : 1,
          stuckTimer: 0,
          prevX: spawnX,
          flyBaseY: spawnY,
        });
      }

      // Add finish marker.
      const finish = { x: width - 100, y: GROUND_Y - 150, w: 16, h: 150 };

      return {
        width,
        diff,
        platforms,
        stumps,
        spikes,
        coins,
        enemies,
        finish,
      };
    }

    function loadLevel(level, options = {}) {
      const {
        spawnX = 80,
        resetCamera = true,
      } = options;
      game.level = level;
      game.biome = biomeForLevel(level);
      game.levelGoalTotal = level * 20;
      game.levelData = generateLevel(level);
      game.levelCoins = 0;
      game.sparkles.length = 0;

      player.x = clamp(spawnX, 20, game.levelData.width - player.w - 20);
      player.y = GROUND_Y - PLAYER.height;
      player.w = PLAYER.width;
      player.h = PLAYER.height;
      player.vx = 0;
      player.vy = 0;
      player.facing = 1;
      player.onGround = true;
      player.jumpCount = 0;
      player.lastJumpTime = -99;
      player.ducking = false;
      player.animTime = 0;
      player.spinTime = 0;
      player.deathSpin = 0;
      player.deathVx = 0;
      player.deathVy = 0;
      if (resetCamera) {
        game.cameraX = 0;
      } else {
        game.cameraX = clamp(player.x - BASE_W * 0.5, 0, game.levelData.width - BASE_W);
      }
      game.flashTimer = 0;
    }

    function startNewGame() {
      game.mode = "playing";
      game.level = 1;
      game.biome = biomeForLevel(1);
      game.lives = 3;
      game.totalCoins = 0;
      game.levelCompleteTimer = 0;
      game.deathTimer = 0;
      game.levelUpFlash = 0;
      loadLevel(1);
    }

    // ------------------------------
    // Physics and collisions
    // ------------------------------
    function getPlayerRect(nextX = player.x, nextY = player.y) {
      return { x: nextX, y: nextY, w: player.w, h: player.h };
    }

    function collideWithSolids(rect, solids) {
      for (let i = 0; i < solids.length; i += 1) {
        const s = solids[i];
        if (overlaps(rect, s)) return s;
      }
      return null;
    }

    function killPlayer() {
      if (game.mode !== "playing") return;
      if (player.invTimer > 0) return;
      game.deathX = player.x;
      game.mode = "dying";
      game.deathTimer = 1.5;
      player.deathSpin = 0;
      player.deathFlash = 0.18;
      player.deathVx = (player.facing || 1) * 220;
      player.deathVy = -520;
      sfx.death();
    }

    function respawnOrGameOver() {
      game.lives -= 1;
      if (game.lives <= 0) {
        updateBestScore();
        game.mode = "gameOver";
        return;
      }

      const ld = game.levelData;
      const groundY = GROUND_Y - PLAYER.height;
      const offsets = [0, 90, -90, 170, -170, 260, -260, 360, -360, 480, -480, 620, -620, 760, -760];
      let spawnX = 80;

      function isSafeSpot(x) {
        const pRect = { x, y: groundY, w: PLAYER.width, h: PLAYER.height };
        const overhead = { x, y: groundY - PLAYER.height - 2, w: PLAYER.width, h: PLAYER.height };
        for (let i = 0; i < ld.spikes.length; i += 1) {
          if (overlaps(pRect, ld.spikes[i])) return false;
        }
        for (let i = 0; i < ld.stumps.length; i += 1) {
          if (overlaps(pRect, ld.stumps[i])) return false;
        }
        for (let i = 0; i < ld.platforms.length; i += 1) {
          if (overlaps(pRect, ld.platforms[i])) return false;
          if (overlaps(overhead, ld.platforms[i])) return false;
        }
        for (let i = 0; i < ld.enemies.length; i += 1) {
          const e = ld.enemies[i];
          if (!e.alive) continue;
          if (overlaps(pRect, { x: e.x, y: e.y, w: e.w, h: e.h })) return false;
        }
        return true;
      }

      for (let i = 0; i < offsets.length; i += 1) {
        const x = clamp(game.deathX + offsets[i], 20, ld.width - PLAYER.width - 20);
        if (isSafeSpot(x)) {
          spawnX = x;
          break;
        }
      }

      player.x = spawnX;
      player.y = groundY;
      player.w = PLAYER.width;
      player.h = PLAYER.height;
      player.vx = 0;
      player.vy = 0;
      player.facing = 1;
      player.onGround = true;
      player.jumpCount = 0;
      player.lastJumpTime = -99;
      player.ducking = false;
      player.spinTime = 0;
      game.cameraX = clamp(player.x - BASE_W * 0.5, 0, ld.width - BASE_W);
      player.invTimer = PLAYER.invincibleRespawn;
      game.mode = "playing";
    }

    function tryJump(nowTime) {
      const canGroundJump = player.onGround;
      const fastSecondPress = nowTime - player.lastJumpTime <= PLAYER.jumpWindow;
      const canDoubleJump = player.jumpCount === 1 && fastSecondPress;

      if (canGroundJump) {
        player.vy = PLAYER.jumpVel;
        player.onGround = false;
        player.jumpCount = 1;
        player.lastJumpTime = nowTime;
        sfx.jump();
      } else if (canDoubleJump) {
        player.vy = PLAYER.doubleJumpVel;
        player.jumpCount = 2;
        player.spinTime = 0.34;
        player.lastJumpTime = nowTime;
        sfx.doubleJump();
      }
    }

    function updatePlayer(dt, nowTime) {
      const ld = game.levelData;
      const solids = [...ld.platforms, ...ld.stumps];

      player.animTime += dt;
      if (player.invTimer > 0) player.invTimer = Math.max(0, player.invTimer - dt);
      if (player.spinTime > 0) player.spinTime = Math.max(0, player.spinTime - dt);

      player.ducking = input.down && player.onGround;
      const desiredH = player.ducking ? PLAYER.duckHeight : PLAYER.height;
      if (desiredH !== player.h) {
        const delta = player.h - desiredH;
        player.h = desiredH;
        player.y += delta;
      }

      const moveDir = (input.right ? 1 : 0) - (input.left ? 1 : 0);
      const targetSpeed = moveDir * (input.run ? PLAYER.runSpeed : PLAYER.moveSpeed);
      const accel = player.onGround ? PLAYER.accel : PLAYER.accel * PLAYER.airControl;
      const decel = player.onGround ? PLAYER.decel : PLAYER.decel * PLAYER.airControl;

      if (moveDir !== 0 && !player.ducking) {
        player.vx = lerp(player.vx, targetSpeed, clamp((accel * dt) / Math.max(1, Math.abs(targetSpeed - player.vx)), 0, 1));
        player.facing = moveDir;
      } else {
        const sign = Math.sign(player.vx);
        const mag = Math.max(0, Math.abs(player.vx) - decel * dt);
        player.vx = mag * sign;
      }

      if (input.justUp) {
        tryJump(nowTime);
      }

      player.vy += PLAYER.gravity * dt;
      player.vy = Math.min(player.vy, PLAYER.maxFallSpeed);

      let nextX = player.x + player.vx * dt;
      let nextY = player.y;

      // Horizontal collision.
      let rectX = getPlayerRect(nextX, nextY);
      const wall = collideWithSolids(rectX, solids);
      if (wall) {
        if (player.vx > 0) nextX = wall.x - player.w;
        else if (player.vx < 0) nextX = wall.x + wall.w;
        player.vx = 0;
      }

      // Level bounds.
      nextX = clamp(nextX, 0, ld.width - player.w);

      // Vertical collision.
      nextY += player.vy * dt;
      let rectY = getPlayerRect(nextX, nextY);
      let groundHit = false;

      if (nextY + player.h >= GROUND_Y) {
        nextY = GROUND_Y - player.h;
        player.vy = 0;
        groundHit = true;
      }

      if (!groundHit) {
        for (let i = 0; i < solids.length; i += 1) {
          const s = solids[i];
          if (!overlaps(rectY, s)) continue;
          if (player.vy > 0 && player.y + player.h <= s.y + 8) {
            nextY = s.y - player.h;
            player.vy = 0;
            groundHit = true;
            break;
          }
          if (player.vy < 0 && player.y >= s.y + s.h - 8) {
            nextY = s.y + s.h;
            player.vy = 0;
            break;
          }
        }
      }

      player.onGround = groundHit;
      if (groundHit) {
        player.jumpCount = 0;
      }

      player.x = nextX;
      player.y = nextY;

      // Spikes are lethal.
      const pRect = getPlayerRect();
      for (let i = 0; i < ld.spikes.length; i += 1) {
        if (overlaps(pRect, ld.spikes[i])) {
          killPlayer();
          break;
        }
      }
    }

    function collectCoins(dt) {
      const ld = game.levelData;
      const pRect = getPlayerRect();

      for (let i = 0; i < ld.coins.length; i += 1) {
        const c = ld.coins[i];
        c.t += dt * 8;
        if (c.taken) continue;
        const hit = {
          x: c.x - c.r,
          y: c.y - c.r,
          w: c.r * 2,
          h: c.r * 2,
        };
        if (overlaps(pRect, hit)) {
          c.taken = true;
          const amount = c.value || 1;
          game.totalCoins += amount;
          game.levelCoins += amount;
          updateBestScore();
          sfx.coin();
          const dur = c.special ? 0.45 : 0.3;
          game.sparkles.push({ x: c.x, y: c.y, t: dur, max: dur });
        }
      }

      game.sparkles = game.sparkles.filter((s) => {
        s.t -= dt;
        return s.t > 0;
      });
    }

    function updateEnemies(dt) {
      const ld = game.levelData;
      const obstacles = [...ld.stumps, ...ld.spikes];
      const standable = [...ld.platforms];
      const pRect = getPlayerRect();

      for (let i = 0; i < ld.enemies.length; i += 1) {
        const e = ld.enemies[i];
        if (!e.alive) {
          e.squashTimer -= dt;
          continue;
        }

        if (e.type === "blue") {
          const dx = player.x - e.x;
          const dy = (player.y - 25) - e.y;
          e.dir = Math.sign(dx || e.dir || 1);
          e.vx = e.dir * e.speed * 0.68;
          e.vy = clamp(dy * 1.4, -95, 95);
        } else if (e.type === "red") {
          e.aiTimer -= dt;
          if (e.rushTimer > 0) e.rushTimer -= dt;

          const dx = player.x - e.x;
          if (Math.abs(dx) < 300 && game.level >= 2 && Math.random() < (game.level >= 3 ? 0.027 : 0.015)) {
            e.rushTimer = game.level >= 3 ? 0.95 : 0.6;
          }

          if (e.aiTimer <= 0) {
            e.aiTimer = randRange(Math.random, 0.45, 1.4);
            if (Math.random() < 0.34) {
              e.dir *= -1;
            }
          }

          if (e.rushTimer > 0) {
            e.dir = Math.sign(dx || e.dir || 1);
          } else if (Math.abs(dx) < 340 && Math.random() < 0.08) {
            e.dir = Math.sign(dx || e.dir || 1);
          }
          const speedMul = e.rushTimer > 0 ? (game.level >= 3 ? 1.1 : 1.0) : 0.72;
          e.vx = e.dir * e.speed * speedMul;
        } else {
          const dx = player.x - e.x;
          if (Math.abs(dx) < 260 && Math.random() < 0.06) {
            e.dir = Math.sign(dx || e.dir || 1);
          }
          e.vx = e.dir * e.speed * 0.68;
        }

        let nx = e.x + e.vx * dt;
        const future = { x: nx, y: e.y, w: e.w, h: e.h };

        // Turn at level edges.
        if (nx < 0 || nx + e.w > ld.width) {
          e.vx *= -1;
          nx = clamp(nx, 0, ld.width - e.w);
        }

        // Turn on obstacles.
        if (e.type !== "blue") {
          for (let j = 0; j < obstacles.length; j += 1) {
            const o = obstacles[j];
            if (overlaps(future, o)) {
              e.dir *= -1;
              e.vx = e.dir * Math.abs(e.vx || e.speed * 0.6);
              nx = e.x;
              break;
            }
          }
        }

        // If an enemy keeps trying to move but does not progress, force a turn to avoid sticking.
        if (Math.abs(nx - e.prevX) < 0.5 && Math.abs(e.vx) > 20) {
          e.stuckTimer += dt;
          if (e.stuckTimer > 0.4) {
            e.dir *= -1;
            e.vx = e.dir * Math.max(50, Math.abs(e.vx));
            e.stuckTimer = 0;
          }
        } else {
          e.stuckTimer = 0;
        }
        e.prevX = nx;

        e.x = nx;

        // Vertical movement with platform landing support. Enemies can walk off platforms.
        if (e.type !== "blue") {
          e.vy += PLAYER.gravity * dt;
        }
        const prevBottom = e.y + e.h;
        let ny = e.y + e.vy * dt;
        let landed = false;

        if (e.type !== "blue" && e.vy >= 0) {
          for (let j = 0; j < standable.length; j += 1) {
            const s = standable[j];
            const nextBottom = ny + e.h;
            const overlapX = e.x + e.w > s.x && e.x < s.x + s.w;
            if (overlapX && prevBottom <= s.y + 4 && nextBottom >= s.y) {
              ny = s.y - e.h;
              e.vy = 0;
              landed = true;
              break;
            }
          }
        }

        if (e.type === "blue") {
          ny = clamp(ny, 70, GROUND_Y - e.h - 36);
        } else if (!landed && ny + e.h >= GROUND_Y) {
          ny = GROUND_Y - e.h;
          e.vy = 0;
        }
        e.y = ny;

        const eRect = { x: e.x, y: e.y, w: e.w, h: e.h };

        if (!overlaps(pRect, eRect)) continue;

        // Stomp if player lands from above with downward motion.
        const playerBottomPrev = player.y + player.h - player.vy * dt;
        const stompFromAbove = player.vy > 40 && playerBottomPrev <= e.y + 6;

        if (stompFromAbove && e.canBeStomped) {
          e.alive = false;
          e.squashTimer = 0.25;
          player.vy = -360;
          const bonus = e.type === "green" ? 2 : (e.type === "blue" ? 4 : 3);
          game.totalCoins += bonus;
          game.levelCoins += bonus;
          updateBestScore();
          sfx.stomp();
          game.sparkles.push({ x: e.x + e.w * 0.5, y: e.y + e.h * 0.4, t: 0.3, max: 0.3 });
        } else {
          killPlayer();
          return;
        }
      }

      ld.enemies = ld.enemies.filter((e) => e.alive || e.squashTimer > 0);
    }

    function updateCamera(dt) {
      const ld = game.levelData;
      const target = player.x + player.w * 0.5 - BASE_W * 0.5;
      const clamped = clamp(target, 0, ld.width - BASE_W);
      game.cameraX = lerp(game.cameraX, clamped, clamp(8 * dt, 0, 1));
      if (Math.abs(clamped - game.cameraX) < 0.1) game.cameraX = clamped;
    }

    function checkLevelComplete() {
      if (game.totalCoins >= game.levelGoalTotal) {
        const carryX = clamp(player.x + 120, 120, player.x + 600);
        loadLevel(game.level + 1, { spawnX: carryX, resetCamera: false });
        player.invTimer = 1.2;
        game.levelUpFlash = 2.1;
        sfx.levelComplete();
      }
    }

    // ------------------------------
    // Drawing helpers
    // ------------------------------
    function drawPixelText(text, x, y, size = 18, color = COLORS.text, align = "left") {
      ctx.save();
      ctx.font = `bold ${size}px Courier New`;
      ctx.textAlign = align;
      ctx.textBaseline = "top";
      ctx.fillStyle = COLORS.textShadow;
      ctx.fillText(text, Math.floor(x + 2), Math.floor(y + 2));
      ctx.fillStyle = color;
      ctx.fillText(text, Math.floor(x), Math.floor(y));
      ctx.restore();
    }

    function drawBackground(cameraX) {
      const biome = game.biome || BIOMES[0];
      const t = performance.now() * 0.00006;

      // Sky gradient.
      const g = ctx.createLinearGradient(0, 0, 0, BASE_H);
      g.addColorStop(0, biome.skyTop);
      g.addColorStop(1, biome.skyBottom);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, BASE_W, BASE_H);

      if (biome.name === "Space") {
        ctx.fillStyle = "rgba(255,255,255,0.75)";
        for (let i = 0; i < 90; i += 1) {
          const sx = ((i * 97) - (cameraX * 0.08 % 997) + 997) % 997;
          const sy = (i * 53) % 320;
          ctx.fillRect(sx, sy + (i % 3), 2, 2);
        }
      }

      // Distant hills.
      ctx.fillStyle = biome.farHill;
      for (let i = -2; i < 14; i += 1) {
        const x = ((i * 220) - (cameraX * 0.2 % 220));
        const y = 255 + Math.sin(i + t * 20) * 8;
        ctx.beginPath();
        ctx.arc(x + 140, y, 140, Math.PI, 0);
        ctx.closePath();
        ctx.fill();
      }

      // Mid trees / hills.
      ctx.fillStyle = biome.midHill;
      for (let i = -3; i < 18; i += 1) {
        const x = ((i * 170) - (cameraX * 0.38 % 170));
        const y = 295 + ((i % 3) * 5);
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + 40, y - 70);
        ctx.lineTo(x + 80, y);
        ctx.closePath();
        ctx.fill();
      }

      // Near ground ridge.
      ctx.fillStyle = biome.nearGround;
      for (let i = -2; i < 12; i += 1) {
        const x = i * 280 - (cameraX * 0.55 % 280);
        ctx.fillRect(x, 330, 260, 70);
      }
    }

    function drawGround(ld, cameraX) {
      const biome = game.biome || BIOMES[0];
      ctx.fillStyle = biome.ground;
      ctx.fillRect(-cameraX, GROUND_Y, ld.width, BASE_H - GROUND_Y);
      ctx.fillStyle = biome.dirt;
      ctx.fillRect(-cameraX, GROUND_Y + 10, ld.width, BASE_H - GROUND_Y - 10);

      // Small striping for retro texture.
      ctx.fillStyle = "rgba(0,0,0,0.12)";
      for (let x = 0; x < ld.width; x += 14) {
        ctx.fillRect(Math.floor(x - cameraX), GROUND_Y + 12 + ((x / 14) % 2) * 3, 8, 2);
      }
    }

    function drawPlatform(p, cameraX) {
      const biome = game.biome || BIOMES[0];
      const x = Math.floor(p.x - cameraX);
      const y = Math.floor(p.y);
      ctx.fillStyle = biome.platform;
      ctx.fillRect(x, y, p.w, p.h);
      ctx.fillStyle = biome.platformTop;
      ctx.fillRect(x, y, p.w, 4);
      ctx.fillStyle = "rgba(0,0,0,0.15)";
      ctx.fillRect(x, y + p.h - 3, p.w, 3);
    }

    function drawStump(s, cameraX) {
      const biome = game.biome || BIOMES[0];
      const x = Math.floor(s.x - cameraX);
      const y = Math.floor(s.y);
      ctx.fillStyle = biome.stump;
      ctx.fillRect(x, y, s.w, s.h);
      ctx.fillStyle = biome.stumpTop;
      ctx.fillRect(x, y, s.w, 4);
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.fillRect(x + 4, y + 8, s.w - 8, 4);
    }

    function drawSpike(sp, cameraX) {
      const x = sp.x - cameraX;
      const y = sp.y;
      const teeth = Math.max(3, Math.floor(sp.w / 10));
      const toothW = sp.w / teeth;
      for (let i = 0; i < teeth; i += 1) {
        const tx = x + i * toothW;
        ctx.fillStyle = COLORS.spike;
        ctx.beginPath();
        ctx.moveTo(tx, y + sp.h);
        ctx.lineTo(tx + toothW / 2, y);
        ctx.lineTo(tx + toothW, y + sp.h);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = COLORS.spikeShade;
        ctx.beginPath();
        ctx.moveTo(tx + toothW / 2, y + 2);
        ctx.lineTo(tx + toothW, y + sp.h);
        ctx.lineTo(tx + toothW / 2 + 1, y + sp.h);
        ctx.closePath();
        ctx.fill();
      }
    }

    function drawCoin(c, cameraX) {
      if (c.taken) return;
      const bob = Math.sin(c.t) * 2;
      const flash = c.special ? (0.5 + Math.sin(c.t * 5) * 0.5) : 1;
      const x = c.x - cameraX;
      const y = c.y + bob;
      ctx.fillStyle = c.special ? `rgba(255, 122, 51, ${0.8 + flash * 0.2})` : COLORS.coin;
      ctx.beginPath();
      ctx.arc(x, y, c.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = c.special ? "#fff2b5" : COLORS.coinShine;
      ctx.beginPath();
      ctx.arc(x - 2, y - 3, c.r * 0.35, 0, Math.PI * 2);
      ctx.fill();
      if (c.special) {
        ctx.strokeStyle = "rgba(255, 255, 255, 0.65)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, c.r + 3 + flash * 2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.lineWidth = 1;
      }
      ctx.strokeStyle = "rgba(0,0,0,0.2)";
      ctx.stroke();
    }

    function drawSparkles(cameraX) {
      for (let i = 0; i < game.sparkles.length; i += 1) {
        const s = game.sparkles[i];
        const life = s.max || 0.3;
        const p = 1 - s.t / life;
        const rays = 6;
        const r = 4 + p * 10;
        const a = 1 - p;
        ctx.strokeStyle = `rgba(255, 245, 180, ${a.toFixed(3)})`;
        ctx.lineWidth = 2;
        for (let j = 0; j < rays; j += 1) {
          const ang = (j / rays) * Math.PI * 2 + p * 2;
          const x1 = s.x - cameraX + Math.cos(ang) * 2;
          const y1 = s.y + Math.sin(ang) * 2;
          const x2 = s.x - cameraX + Math.cos(ang) * r;
          const y2 = s.y + Math.sin(ang) * r;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }
      }
      ctx.lineWidth = 1;
    }

    function drawEnemy(e, cameraX) {
      const x = e.x - cameraX;
      const y = e.y;
      const squish = e.alive ? 1 : Math.max(0.3, e.squashTimer / 0.25);

      ctx.save();
      ctx.translate(x + e.w / 2, y + e.h);
      ctx.scale(1, squish);
      ctx.translate(-(x + e.w / 2), -(y + e.h));

      const bodyColor = e.type === "green" ? "#43d957" : (e.type === "blue" ? "#47b6ff" : "#ef4747");
      const hornColor = e.type === "green" ? "#c4ff98" : (e.type === "blue" ? "#d2f2ff" : "#ffd3a0");

      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.ellipse(x + e.w / 2, y + e.h * 0.55, e.w * 0.48, e.h * 0.46, 0, 0, Math.PI * 2);
      ctx.fill();

      if (e.type === "blue") {
        const flap = Math.sin(performance.now() * 0.02 + e.x * 0.05) * 3;
        ctx.fillStyle = "rgba(195, 234, 255, 0.92)";
        ctx.beginPath();
        ctx.ellipse(x + e.w * 0.18, y + e.h * 0.48, 10, 5 + flap * 0.2, -0.4, 0, Math.PI * 2);
        ctx.ellipse(x + e.w * 0.82, y + e.h * 0.48, 10, 5 - flap * 0.2, 0.4, 0, Math.PI * 2);
        ctx.fill();
      }

      if (e.hasHorns) {
        // Pointy horn variant.
        ctx.fillStyle = hornColor;
        ctx.beginPath();
        ctx.moveTo(x + e.w * 0.25, y + 4);
        ctx.lineTo(x + e.w * 0.35, y - 7);
        ctx.lineTo(x + e.w * 0.42, y + 5);
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(x + e.w * 0.58, y + 5);
        ctx.lineTo(x + e.w * 0.66, y - 6);
        ctx.lineTo(x + e.w * 0.76, y + 6);
        ctx.closePath();
        ctx.fill();
      } else {
        // Round-ear variant (stompable).
        ctx.fillStyle = hornColor;
        ctx.beginPath();
        ctx.arc(x + e.w * 0.32, y + 3, 4, 0, Math.PI * 2);
        ctx.arc(x + e.w * 0.68, y + 3, 4, 0, Math.PI * 2);
        ctx.fill();
      }

      // Eyes.
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(x + e.w * 0.38, y + e.h * 0.42, 5, 0, Math.PI * 2);
      ctx.arc(x + e.w * 0.62, y + e.h * 0.42, 5, 0, Math.PI * 2);
      ctx.fill();

      const pupilShift = Math.sign(e.vx || 1) * 1.7;
      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.arc(x + e.w * 0.38 + pupilShift, y + e.h * 0.43, 2, 0, Math.PI * 2);
      ctx.arc(x + e.w * 0.62 + pupilShift, y + e.h * 0.43, 2, 0, Math.PI * 2);
      ctx.fill();

      if (e.type === "red") {
        ctx.strokeStyle = "#6f1717";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + e.w * 0.31, y + e.h * 0.31);
        ctx.lineTo(x + e.w * 0.46, y + e.h * 0.34);
        ctx.moveTo(x + e.w * 0.69, y + e.h * 0.31);
        ctx.lineTo(x + e.w * 0.54, y + e.h * 0.34);
        ctx.stroke();
        ctx.lineWidth = 1;
      }

      // Stubby legs.
      ctx.fillStyle = "#2c2c2c";
      ctx.fillRect(x + e.w * 0.2, y + e.h - 7, 7, 7);
      ctx.fillRect(x + e.w * 0.62, y + e.h - 7, 7, 7);
      ctx.restore();
    }

    function drawPlayer() {
      const blink = player.invTimer > 0 && Math.floor(player.invTimer * 12) % 2 === 0;
      if (blink) return;

      const bob = player.onGround && !player.ducking ? Math.sin(player.animTime * 5) * 1.6 : 0;
      const px = Math.floor(player.x - game.cameraX + player.w / 2);
      const py = Math.floor(player.y + player.h / 2 + bob);

      const running = Math.abs(player.vx) > 30 && player.onGround && !player.ducking;
      const jumping = !player.onGround;
      const ducking = player.ducking;
      const legCycle = Math.floor(player.animTime * 14) % 2;

      ctx.save();
      ctx.translate(px, py);
      if (player.facing < 0) ctx.scale(-1, 1);
      if (player.spinTime > 0) {
        const spinP = 1 - player.spinTime / 0.34;
        ctx.rotate(spinP * Math.PI * 4);
      }

      if (game.mode === "dying") {
        const flash = Math.floor(player.deathFlash * 20) % 2 === 0;
        if (flash) {
          ctx.globalCompositeOperation = "source-over";
          ctx.fillStyle = "rgba(255,0,0,0.45)";
          ctx.fillRect(-26, -28, 52, 56);
        }
      }

      const bodyColor = "#9b6b36";
      const bellyColor = "#ead4b0";
      const spineColor = "#5f3415";

      // Back spikes.
      ctx.fillStyle = spineColor;
      for (let i = 0; i < 7; i += 1) {
        const sy = -18 + i * 6;
        const sx = -18 - i * 2;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(sx - 14, sy - 4);
        ctx.lineTo(sx - 2, sy + 6);
        ctx.closePath();
        ctx.fill();
      }

      // Body.
      const bodyW = ducking ? 32 : 30;
      const bodyH = ducking ? 24 : 28;
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.ellipse(-1, -2, bodyW * 0.52, bodyH * 0.56, 0, 0, Math.PI * 2);
      ctx.fill();

      // Belly.
      ctx.fillStyle = bellyColor;
      ctx.beginPath();
      ctx.ellipse(3, 3, bodyW * 0.32, bodyH * 0.34, 0, 0, Math.PI * 2);
      ctx.fill();

      // Snout.
      ctx.fillStyle = "#ddb58f";
      ctx.beginPath();
      ctx.ellipse(14, 2, 8, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#2d1e15";
      ctx.beginPath();
      ctx.arc(20, 1, 1.8, 0, Math.PI * 2);
      ctx.fill();

      // Eyes.
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(8, -6, 5, 0, Math.PI * 2);
      ctx.arc(1, -7, 4.8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#171717";
      ctx.beginPath();
      ctx.arc(9.5, -5.5, 2, 0, Math.PI * 2);
      ctx.arc(2.2, -6.8, 1.9, 0, Math.PI * 2);
      ctx.fill();

      // Legs / pose.
      ctx.fillStyle = "#6f4a24";
      if (ducking) {
        ctx.fillRect(-7, 10, 7, 5);
        ctx.fillRect(2, 10, 7, 5);
      } else if (jumping) {
        ctx.fillRect(-5, 8, 6, 4);
        ctx.fillRect(2, 7, 6, 4);
      } else if (running) {
        if (legCycle === 0) {
          ctx.fillRect(-7, 11, 6, 7);
          ctx.fillRect(3, 9, 6, 7);
        } else {
          ctx.fillRect(-7, 9, 6, 7);
          ctx.fillRect(3, 11, 6, 7);
        }
      } else {
        ctx.fillRect(-6, 10, 6, 6);
        ctx.fillRect(2, 10, 6, 6);
      }

      ctx.restore();
    }

    function drawFinishMarker(ld, cameraX) {
      const f = ld.finish;
      const x = Math.floor(f.x - cameraX);
      const y = Math.floor(f.y);
      ctx.fillStyle = "#f4f4f4";
      ctx.fillRect(x, y, f.w, f.h);
      ctx.fillStyle = "#ff3c3c";
      ctx.beginPath();
      ctx.moveTo(x + f.w, y + 12);
      ctx.lineTo(x + f.w + 44, y + 24);
      ctx.lineTo(x + f.w, y + 36);
      ctx.closePath();
      ctx.fill();
      drawPixelText("FINISH", x - 8, y - 18, 12, "#ffe67b");
    }

    function drawHUD() {
      ctx.save();
      const panelX = 12;
      const panelY = 12;
      const panelW = 274;
      const panelH = 110;
      ctx.fillStyle = COLORS.panel;
      ctx.fillRect(panelX, panelY, panelW, panelH);
      ctx.strokeStyle = COLORS.panelStroke;
      ctx.strokeRect(panelX + 0.5, panelY + 0.5, panelW - 1, panelH - 1);

      const filledHearts = "❤️ ".repeat(game.lives);
      const emptyHearts = "♡ ".repeat(3 - game.lives);
      drawPixelText(`🪙 Coins: ${game.totalCoins}`, panelX + 12, panelY + 10, 18);
      drawPixelText(`⭐ Best: ${game.best}`, panelX + 12, panelY + 32, 18);
      drawPixelText(`Lives: ${filledHearts}${emptyHearts}`.trim(), panelX + 12, panelY + 54, 18);
      drawPixelText(`Level: ${game.level}`, panelX + 184, panelY + 54, 18);
      drawPixelText(`Biome: ${game.biome.name}`, panelX + 12, panelY + 78, 16, "#ffeebb");
      ctx.restore();
    }

    function drawLevelUpFlash() {
      if (game.levelUpFlash <= 0) return;
      const alpha = clamp(game.levelUpFlash / 2.1, 0, 1);
      ctx.fillStyle = `rgba(0, 0, 0, ${(alpha * 0.35).toFixed(3)})`;
      ctx.fillRect(170, 24, 460, 64);
      drawPixelText(`LEVEL ${game.level} - ${game.biome.name.toUpperCase()}!`, BASE_W / 2, 38, 30, `rgba(255, 238, 130, ${alpha.toFixed(3)})`, "center");
    }

    function drawTitleScreen() {
      ctx.fillStyle = "rgba(10, 18, 42, 0.54)";
      ctx.fillRect(0, 0, BASE_W, BASE_H);
      drawPixelText("SONICK", BASE_W / 2, 120, 74, "#ffe450", "center");
      drawPixelText("Porcupine Platform Quest", BASE_W / 2, 208, 24, "#e8f8ff", "center");
      const blink = Math.floor(performance.now() * 0.005) % 2 === 0;
      if (blink) {
        drawPixelText("Press SPACE to start", BASE_W / 2, 285, 26, "#ffffff", "center");
      }
      drawPixelText("Arrows: Move / Jump / Duck  |  Shift: Run", BASE_W / 2, 334, 16, "#d9ecff", "center");
    }

    function drawLevelCompleteOverlay() {
      ctx.fillStyle = "rgba(14, 24, 18, 0.55)";
      ctx.fillRect(0, 0, BASE_W, BASE_H);
      drawPixelText("LEVEL COMPLETE!", BASE_W / 2, 145, 48, "#ffec7a", "center");
      drawPixelText(`Coins this level: ${game.levelCoins}`, BASE_W / 2, 228, 24, "#ffffff", "center");
      drawPixelText(`Total coins: ${game.totalCoins}`, BASE_W / 2, 262, 24, "#ffffff", "center");
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(15, 0, 0, 0.67)";
      ctx.fillRect(0, 0, BASE_W, BASE_H);
      drawPixelText("GAME OVER", BASE_W / 2, 118, 62, "#ff7168", "center");
      drawPixelText(`Final score: ${game.totalCoins}`, BASE_W / 2, 216, 28, "#ffffff", "center");
      drawPixelText(`Best score: ${game.best}`, BASE_W / 2, 252, 26, "#ffd777", "center");

      const bx = BASE_W / 2 - 170;
      const by = 300;
      const bw = 340;
      const bh = 54;
      ctx.fillStyle = "rgba(255,255,255,0.12)";
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeStyle = "rgba(255,255,255,0.4)";
      ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
      drawPixelText("Press SPACE or click to restart", BASE_W / 2, by + 15, 20, "#ffffff", "center");
    }

    // ------------------------------
    // Main update/render loop
    // ------------------------------
    function update(dt, nowTime) {
      if (game.mode === "title") {
        if (input.justSpace || input.justClick) {
          startNewGame();
        }
        return;
      }

      if (game.mode === "playing") {
        if (game.levelUpFlash > 0) game.levelUpFlash = Math.max(0, game.levelUpFlash - dt);
        updatePlayer(dt, nowTime);
        if (game.mode === "playing") {
          collectCoins(dt);
          updateEnemies(dt);
          updateCamera(dt);
          checkLevelComplete();
        }
      } else if (game.mode === "dying") {
        player.deathSpin += dt * 14;
        player.deathFlash = Math.max(0, player.deathFlash - dt);
        player.deathVy += PLAYER.gravity * dt;
        player.x += player.deathVx * dt;
        player.y += player.deathVy * dt;
        updateCamera(dt);

        game.deathTimer -= dt;
        if (game.deathTimer <= 0) {
          respawnOrGameOver();
        }
      } else if (game.mode === "gameOver") {
        if (input.justSpace || input.justClick) {
          startNewGame();
        }
      }
    }

    function renderWorld() {
      const ld = game.levelData;
      drawBackground(game.cameraX);
      drawGround(ld, game.cameraX);

      for (let i = 0; i < ld.platforms.length; i += 1) {
        drawPlatform(ld.platforms[i], game.cameraX);
      }
      for (let i = 0; i < ld.stumps.length; i += 1) {
        drawStump(ld.stumps[i], game.cameraX);
      }
      for (let i = 0; i < ld.spikes.length; i += 1) {
        drawSpike(ld.spikes[i], game.cameraX);
      }
      for (let i = 0; i < ld.coins.length; i += 1) {
        drawCoin(ld.coins[i], game.cameraX);
      }
      for (let i = 0; i < ld.enemies.length; i += 1) {
        drawEnemy(ld.enemies[i], game.cameraX);
      }

      drawFinishMarker(ld, game.cameraX);
      drawSparkles(game.cameraX);

      if (game.mode === "dying") {
        ctx.save();
        const cx = player.x - game.cameraX + player.w * 0.5;
        const cy = player.y + player.h * 0.5;
        ctx.translate(cx, cy);
        ctx.rotate(player.deathSpin);
        ctx.translate(-cx, -cy);
        drawPlayer();
        ctx.restore();
      } else {
        drawPlayer();
      }

      drawHUD();
      drawLevelUpFlash();

      if (game.mode === "gameOver") {
        drawGameOver();
      }
    }

    function render() {
      ctx.clearRect(0, 0, BASE_W, BASE_H);

      if (game.mode === "title") {
        drawBackground(0);
        drawPixelText("SONICK", BASE_W / 2, 100, 74, "#ffe450", "center");
        drawPixelText("A Porcupine Platform Adventure", BASE_W / 2, 184, 22, "#f8fbff", "center");
        drawTitleScreen();
        return;
      }

      renderWorld();
    }

    let last = performance.now();
    let acc = 0;

    function frame(ts) {
      let dt = (ts - last) / 1000;
      last = ts;
      dt = Math.min(dt, MAX_FRAME_DT);
      acc += dt;

      while (acc >= FIXED_DT) {
        update(FIXED_DT, ts / 1000);
        acc -= FIXED_DT;

        // One-frame inputs consumed in fixed-step simulation.
        input.justUp = false;
        input.justSpace = false;
        input.justClick = false;
      }

      render();
      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
